title: "James Ahabyona"
tagline: "Applied Microeconomist"
description: >-
  James Ahabyona is an applied microeconomist researching development,
  technology adoption, education, and the long-term effects of early-life
  circumstances across Africa. Master's student at Nova SBE.
author: "James Ahabyona"
email: 'jemo44t@gmail.com'

baseurl: ""
url: "https://jamesahabyona.github.io/"

# Social
github_username: 'jamesahabyona'
linkedin_username: 'in/james-ahabyona-236b81129/'
twitter_username: 'a_ha256'

# Build settings
markdown: kramdown
permalink: /:title/
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# Collections — none for now (pages only)
collections: {}

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - phantom.gemspec
  - vendor/
  - node_modules/
  - .sass-cache/
  - .jekyll-cache/
  - .github/

# Site-wide nav (also defined in _includes/site-header.html, kept in sync)
nav:
